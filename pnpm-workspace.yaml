    "@eslint/compat": "2.1.0"
    "@eslint/css": "1.3.0"
    "@eslint/js": "10.0.1"
    "@eslint/json": "2.0.0"
    "@nuxt/eslint": "1.16.0"
    "eslint-config-prettier": "10.1.8"
    "eslint-plugin-vue": "10.9.2"
    "typescript-eslint": "8.61.1"
  nuxt3:
    nuxt: 3.21.8
    "@nuxt/test-utils": 3.23.0
    "@nuxtjs/i18n": 9.5.6
    "@nuxtjs/storybook": 9.0.1
  vue3:
    vue: 3.5.38
packages:
  - packages/**
