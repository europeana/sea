name: "Lokalise: push"

on:
  # TODO: also commits to main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force upload of all base language strings. (Lokalise "rambo" mode.)'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Push files to Lokalise
        uses: lokalise/lokalise-push-action@385d5affc383452a0801db7b06d9e42f2e6a9bbe # v5.3.2
        with:
          api_token: ${{ secrets.LOKALISE_API_TOKEN_RW }}
          project_id: ${{ secrets.LOKALISE_PROJECT_ID }}
          file_format: json
          translations_path: packages/apps/ds4ch/i18n/locales
          base_lang: en_GB
          flat_naming: true
          name_pattern: en.json
          use_tag_tracking: true
          rambo_mode: ${{ inputs.force }}
          additional_params: |
            --cleanup-mode
