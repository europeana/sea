name: "Lokalise: pull"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Pull from Lokalise
        uses: lokalise/lokalise-pull-action@8b802cd5a8f4e739da3aace50cb1ec7aaecab260 # v5.2.3
        with:
          api_token: ${{ secrets.LOKALISE_API_TOKEN }}
          project_id: ${{ secrets.LOKALISE_PROJECT_ID }}
          file_format: json
          translations_path: packages/apps/ds4ch/i18n/locales
          base_lang: en_GB
          flat_naming: true
          skip_include_tags: true
          always_pull_base: true
          git_commit_message: "chore(ds4ch): update translations"
          custom_github_token: "${{ secrets.GIT_PAT_LOKALISE }}"
          additional_params: |
            indentation: 2sp
            export_empty_as: skip
            export_sort: a_z
            replace_breaks: false
            add_newline_eof: true
            language_mapping:
              - original_language_iso: en_GB
                custom_language_iso: en
              - original_language_iso: mt_MT
                custom_language_iso: mt
              - original_language_iso: ga_IE
                custom_language_iso: ga
            placeholder_format: icu
